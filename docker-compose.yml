version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quantion-sqlserver
    restart: unless-stopped
    ports:
      - "${SQL_SERVER_PORT:-14331}:1433"
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    volumes:
      - quantion-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # --- PERSISTÈNCIA LOCAL PER AL SERVEI ---
  kafka:
    image: apache/kafka:latest
    container_name: quantion-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: quantion-kafka-ui
    ports:
      - "8082:8080" # Canviat el port extern a 8082 per evitar conflictes
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: 'Quantion-Local-Cluster'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:9092'

  rabbitmq:
    image: rabbitmq:3-management
    container_name: quantion-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: quantion-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

  # Service Bus Emulator: imatge oficial no disponible públicament
  # Alternativa: usar Azure Service Bus localment o SDK fake per tests
  # azure-service-bus-emulator:
  #   image: mcr.microsoft.com/azure-messaging/service-bus-emulator:latest
  #   container_name: quantion-azure-servicebus
  #   ports:
  #     - "5671:5671"
  #   environment:
  #     ACCEPT_EULA: "Y"

volumes:
  quantion-sqlserver-data: